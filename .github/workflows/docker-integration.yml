name: Docker Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: docker-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-integration:
    name: Docker-backed integration tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Run Docker integration tests
        run: >
          uv run --locked pytest
          tests/integration_external
          tests/integration_local
          tests/integration_rule_coverage
          -q
