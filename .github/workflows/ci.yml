name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  fast-checks:
    name: Fast checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Lint
        run: uv run --locked ruff check .

      - name: Compile sources
        run: uv run --locked python -m compileall -q src

      - name: Run fast tests
        run: >
          uv run --locked pytest tests
          --ignore=tests/integration_external
          --ignore=tests/integration_local
          --ignore=tests/integration_rule_coverage
          -q

      - name: Load rule catalog
        run: uv run --locked webconf-audit list-rules
